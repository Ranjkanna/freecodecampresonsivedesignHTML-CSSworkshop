<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>
  <body>
    <h1 id="title">Consumer Survey Form</h1>
<p id="description">Please filled out the survey from your opinions to enhance our service.</p>
  <form id="survey-form">
  <input type="text" id="name" required placeholder="Full Name"></input>
  <label id="name-label" for="name">Name:(in captions)</label>
 
  <input type="email" id="email" required placeholder="***@gmail.com"></input>
  <label id="email-label" for="email">Email:</label>
  
  <input type="number" id="number" min="20" max="30" placeholder="Age" required>

  <label id="number-label" for="number">Age</label>
  <select id="dropdown">
    <option>Satisfied</option >
    <option>unsatisfied</option>
    </select>
    <input type="radio" value="choose" name="survey">Male</input>
    <input type="radio" name="survey" value="choose">Female</input>
    <input type="checkbox" value="check">Monthly</input>
    <input type="checkbox" value="check">Yearly</input>

    <textarea></textarea>
  
<button id="submit">Submit</button>



  </body>
</html>
